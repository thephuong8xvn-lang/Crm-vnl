<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yến Sào Vĩnh Hưng — CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300..500,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'c-bg':       '#F9F5EE',
            'c-accent':   '#C89A3D',
            'c-primary':  '#7b5800',
            'c-text':     '#1f1b15',
            'c-muted':    '#8B8375',
            'c-border':   '#E3D7C8',
            'c-surface':  '#FFFFFF',
            'c-high':     '#f0e7dc',
            'c-warn':     '#D96C3F',
            'c-success':  '#3A8F68',
            'c-error':    '#ba1a1a',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="bg-c-bg text-c-text" style="font-family:'Inter',sans-serif;">

  <div id="app" class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="glass-panel w-[230px] h-screen flex-shrink-0 flex flex-col border-r border-c-border z-40 fixed left-0 top-0">
      <div class="px-5 py-6 border-b border-c-border">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-c-accent flex items-center justify-center text-white font-semibold text-sm">YH</div>
          <div>
            <div class="text-sm font-semibold text-c-primary leading-tight">Yến Sào Vĩnh Hưng</div>
            <div class="text-[11px] text-c-muted">Premium CRM</div>
          </div>
        </div>
      </div>
      <nav class="flex-1 px-3 py-4 overflow-y-auto">
        <ul class="space-y-1" id="nav-menu">
          <li><a href="#dashboard"  class="nav-link" data-page="dashboard">  <span class="material-symbols-outlined">dashboard</span>  Tổng quan</a></li>
          <li><a href="#kanban"     class="nav-link" data-page="kanban">     <span class="material-symbols-outlined">auto_awesome</span> Cơ hội</a></li>
          <li><a href="#tasks"      class="nav-link" data-page="tasks">      <span class="material-symbols-outlined">assignment</span>   Công việc</a></li>
          <li><a href="#customers"  class="nav-link" data-page="customers">  <span class="material-symbols-outlined">group</span>        Khách hàng</a></li>
          <li><a href="#payments"   class="nav-link" data-page="payments">   <span class="material-symbols-outlined">payments</span>     Thanh toán</a></li>
        </ul>
      </nav>
      <div class="px-3 py-4 border-t border-c-border">
        <a href="#settings" class="nav-link" data-page="settings">
          <span class="material-symbols-outlined">settings</span> Cài đặt
        </a>
        <div class="mt-3 flex items-center gap-3 px-3 py-2">
          <div class="w-8 h-8 rounded-full bg-c-high flex items-center justify-center text-xs font-medium text-c-primary">AD</div>
          <div>
            <div class="text-xs font-medium text-c-text">Admin</div>
            <div class="text-[11px] text-c-muted">Quản trị viên</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN WRAPPER -->
    <div class="flex-1 flex flex-col ml-[230px] min-w-0">
      <!-- TOP HEADER -->
      <header id="top-header" class="glass-panel h-16 flex-shrink-0 flex items-center justify-between px-8 border-b border-c-border sticky top-0 z-30">
        <div>
          <h1 id="page-title" class="text-lg font-semibold text-c-text leading-tight"></h1>
          <p  id="page-subtitle" class="text-xs text-c-muted"></p>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="CRM.ui.showSearch()" class="icon-btn" title="Tìm kiếm">
            <span class="material-symbols-outlined">search</span>
          </button>
          <button class="icon-btn" title="Thông báo">
            <span class="material-symbols-outlined">notifications</span>
          </button>
          <button onclick="CRM.router.navigate('settings')" class="icon-btn" title="Tài khoản">
            <span class="material-symbols-outlined">account_circle</span>
          </button>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <main id="page-content" class="flex-1 overflow-auto"></main>
    </div>
  </div>

  <!-- MODAL OVERLAY -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center p-4" onclick="CRM.ui.closeModal(event)">
    <div id="modal-box" class="glass-panel rounded-2xl w-full max-w-lg max-h-[90vh] flex flex-col shadow-xl" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between px-6 py-4 border-b border-c-border flex-shrink-0">
        <h2 id="modal-title" class="text-base font-semibold text-c-text"></h2>
        <button onclick="CRM.ui.closeModal()" class="icon-btn"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div id="modal-body" class="flex-1 overflow-y-auto p-6"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-[60] space-y-2"></div>

  <!-- SCRIPTS (order matters) -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/kanban.js"></script>
  <script src="js/pages/tasks.js"></script>
  <script src="js/pages/customers.js"></script>
  <script src="js/pages/payments.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script>
    // Boot after all scripts + CDNs loaded
    window.addEventListener('load', () => CRM.router.init());
  </script>
</body>
</html>
